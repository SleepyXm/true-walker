<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CodeIndex</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.16);
    --text: #e2e2e2;
    --muted: #666;
    --dim: #3a3a3a;
    --accent: #c8f060;
    --fn-bg: rgba(56,189,248,0.1);
    --fn-fg: #7dd3fc;
    --imp-bg: rgba(200,240,96,0.1);
    --imp-fg: #c8f060;
    --param-bg: rgba(196,181,253,0.1);
    --param-fg: #c4b5fd;
    --class-bg: rgba(251,191,36,0.1);
    --class-fg: #fbbf24;
    --route-bg: rgba(52,211,153,0.1);
    --route-fg: #34d399;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2.5rem 1.5rem;
  }

  .layout { max-width: 780px; margin: 0 auto; }

  .header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 2rem;
  }
  .logo {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--muted); }
  .header-sub { font-size: 12px; color: var(--muted); }

  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    pointer-events: none;
  }
  #ci-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 40px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  #ci-input:focus { border-color: var(--border-hover); }
  #ci-input::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .filter {
    font-size: 11px;
    font-family: var(--sans);
    padding: 4px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter:hover { border-color: var(--border-hover); color: var(--text); }
  .filter.active { background: rgba(200,240,96,0.1); border-color: rgba(200,240,96,0.3); color: var(--accent); }

  .meta {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 14px;
    min-height: 16px;
  }

  .results { display: flex; flex-direction: column; gap: 5px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    transition: border-color 0.12s;
    animation: card-in 0.18s ease both;
  }
  .card:hover { border-color: var(--border-hover); }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: none; }
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
  }

  .badge {
    font-size: 10px;
    font-family: var(--sans);
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .badge-function { background: var(--fn-bg); color: var(--fn-fg); }
  .badge-import   { background: var(--imp-bg); color: var(--imp-fg); }
  .badge-param    { background: var(--param-bg); color: var(--param-fg); }
  .badge-class    { background: var(--class-bg); color: var(--class-fg); }
  .badge-route    { background: var(--route-bg); color: var(--route-fg); }

  .card-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-line {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    flex-shrink: 0;
  }

  .card-path {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-detail {
    font-family: var(--mono);
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  mark {
    background: rgba(200,240,96,0.2);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  .empty {
    text-align: center;
    padding: 3rem 0;
    color: var(--muted);
    font-size: 13px;
  }
  .empty svg { display: block; margin: 0 auto 10px; opacity: 0.3; }

  .loading {
    text-align: center;
    padding: 3rem 0;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .dot-pulse::after {
    content: '';
    animation: dots 1.2s steps(4) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }

  .error {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    color: #f87171;
    font-family: var(--mono);
  }
</style>
</head>
<body>
<div class="layout">
  <div class="header">
    <div class="logo">code<span>/</span>index</div>
    <div class="header-sub" id="header-sub">no index loaded</div>
  </div>
  <input type="file" id="file-input" accept=".json" style="display:none" />

  <div class="search-wrap">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="ci-input" type="text" placeholder="Search symbols, imports, params…" autocomplete="off" />
  </div>

  <div class="filters" id="filters">
    <button class="filter active" data-type="all">All</button>
    <button class="filter" data-type="function">Function</button>
    <button class="filter" data-type="import">Import</button>
    <button class="filter" data-type="param">Param</button>
    <button class="filter" data-type="class">Class</button>
    <button class="filter" data-type="route">Route</button>
  </div>

  <div class="meta" id="ci-meta"></div>
  <div class="results" id="ci-results">
    <div class="loading">
      <label for="file-input" style="cursor:pointer; color: var(--accent); text-decoration: underline; text-underline-offset: 3px;">Load output.json</label>
    </div>
  </div>
</div>

<script>
let items = [];
let activeFilter = 'all';

function parseOutput(data) {
  const files = Array.isArray(data) ? data : [data];
  const paramsSeen = new Set();
  const out = [];

  for (const file of files) {
    const path = file.path || file.Path || '';

    for (const fn of (file.functions || file.Functions || [])) {
      const name = fn.Name || fn.name || '';
      const rawParams = fn.RawParams || fn.rawParams || '';
      const params = fn.Params || fn.params || [];
      const line = fn.StartLine || fn.startLine || null;

      out.push({
        type: 'function',
        name,
        path,
        line,
        detail: rawParams,
        tags: [name, ...params.map(p => p.Name || p.name || ''), path]
      });

      for (const p of params) {
        const pname = p.Name || p.name || '';
        const ptype = p.Type || p.type || '';
        const key = pname;
        if (!paramsSeen.has(key)) {
          paramsSeen.set ? paramsSeen.add(key) : null;
          out.push({
            type: 'param',
            name: pname,
            path,
            line: null,
            detail: ptype ? `${ptype} — in ${name}` : `in ${name}`,
            tags: [pname, ptype, name, path]
          });
        }
      }
    }

    for (const imp of (file.imports || file.Imports || [])) {
      const impPath = imp.Path || imp.path || '';
      const alias = imp.Alias || imp.alias || '';
      const names = imp.Names || imp.names || [];
      const nameParts = [];
      if (alias) nameParts.push(`as ${alias}`);
      if (names && names.length) nameParts.push(names.join(', '));

      out.push({
        type: 'import',
        name: impPath,
        path,
        line: null,
        detail: nameParts.join(' — '),
        tags: [impPath, alias, ...(names || []), path]
      });
    }

    for (const cls of (file.classes || file.Classes || [])) {
      if (!cls) continue;
      const name = cls.Name || cls.name || '';
      out.push({
        type: 'class',
        name,
        path,
        line: cls.StartLine || null,
        detail: '',
        tags: [name, path]
      });
    }

    for (const route of (file.routes || file.Routes || [])) {
      if (!route) continue;
      const name = route.Path || route.path || route.Name || route.name || '';
      const method = route.Method || route.method || '';
      out.push({
        type: 'route',
        name,
        path,
        line: route.Line || null,
        detail: method,
        tags: [name, method, path]
      });
    }
  }

  return out;
}

function hl(text, q) {
  if (!q || !text) return text || '';
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return String(text).replace(re, '<mark>$1</mark>');
}

function render() {
  const q = document.getElementById('ci-input').value.trim().toLowerCase();
  const el = document.getElementById('ci-results');
  const meta = document.getElementById('ci-meta');

  const filtered = items.filter(it => {
    if (activeFilter !== 'all' && it.type !== activeFilter) return false;
    if (!q) return true;
    return it.tags.some(t => t && t.toLowerCase().includes(q))
        || (it.detail && it.detail.toLowerCase().includes(q))
        || it.name.toLowerCase().includes(q);
  });

  meta.textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}${q ? ` for "${q}"` : ''}`;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6"/>
      </svg>
      No results found
    </div>`;
    return;
  }

  el.innerHTML = filtered.map((it, i) => `
    <div class="card" style="animation-delay:${Math.min(i * 0.025, 0.4)}s">
      <div class="card-top">
        <span class="badge badge-${it.type}">${it.type}</span>
        <span class="card-name">${hl(it.name, q)}</span>
        ${it.line ? `<span class="card-line">L${it.line}</span>` : ''}
      </div>
      <div class="card-path">${hl(it.path, q)}</div>
      ${it.detail ? `<div class="card-detail">${hl(it.detail, q)}</div>` : ''}
    </div>
  `).join('');
}

document.getElementById('ci-input').addEventListener('input', render);

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter');
  if (!btn) return;
  document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.type;
  render();
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      items = parseOutput(data);
      const files = Array.isArray(data) ? data : [data];
      document.getElementById('header-sub').textContent =
        `${files.length} file${files.length !== 1 ? 's' : ''} · ${items.length} symbols`;
      render();
    } catch (err) {
      document.getElementById('ci-results').innerHTML =
        `<div class="error">Failed to parse ${file.name} — ${err.message}</div>`;
      document.getElementById('header-sub').textContent = 'error';
    }
  };
  reader.readAsText(file);
});
</script>
</body>
</html>
