conditional_rules:

  # ── Go ────────────────────────────────────────────────────────────────────
  - name: go-if
    kind: if
    pattern: '^\s*if\s+(?P<condition>[^{]+)\s*\{'
    language: .go

  - name: go-else-if
    kind: else_if
    pattern: '^\s*}\s*else\s+if\s+(?P<condition>[^{]+)\s*\{'
    language: .go

  - name: go-else
    kind: else
    pattern: '^\s*}\s*else\s*\{'
    language: .go

  - name: go-switch
    kind: switch
    pattern: '^\s*switch\s*(?P<condition>[^{]*)\s*\{'
    language: .go

  - name: go-case
    kind: case
    pattern: '^\s*case\s+(?P<condition>[^:]+):'
    language: .go

  - name: go-default
    kind: default
    pattern: '^\s*default\s*:'
    language: .go

  # ── Python ────────────────────────────────────────────────────────────────
  - name: py-if
    kind: if
    pattern: '^\s*if\s+(?P<condition>[^:]+):'
    language: .py

  - name: py-elif
    kind: else_if
    pattern: '^\s*elif\s+(?P<condition>[^:]+):'
    language: .py

  - name: py-else
    kind: else
    pattern: '^\s*else\s*:'
    language: .py

  - name: py-match
    kind: match
    pattern: '^\s*match\s+(?P<condition>[^:]+):'
    language: .py

  - name: py-case
    kind: case
    pattern: '^\s*case\s+(?P<condition>[^:]+):'
    language: .py

