loop_rules:
  - name: for-loop
    pattern: 'for\s*\(.*\)\s*{'
  - name: while-loop
    pattern: 'while\s*\(.*\)\s*{'
  - name: python-for
    pattern: 'for\s+.*:\s*$'
  - name: python-while
    pattern: 'while\s+.*:\s*$'
  - name: go-loops
    pattern: '(?P<loop>for|range)\s+.*\s*{'
 
assignment_rules:
  - name: variable-assignment
    pattern: '(?P<var>\w+)\s*=\s*.*'
  - name: go-short-variable-declaration
    pattern: '(?P<var>\w+)\s*:=\s*.*'
 
return_rules:
  - name: go-return-multi
    pattern: 'return\s+(?P<value>[^,\n]+(?:,\s*[^,\n]+)+)'
    language: .go
 
  - name: go-return-single
    pattern: '^\s+return\s+(?P<value>\S+)'
    language: .go
 
  - name: py-raise
    pattern: 'raise\s+(?P<value>[\w]+(?:\s*\([^)]*\))?)'
    language: .py
 
  - name: ts-throw
    pattern: 'throw\s+new\s+(?P<value>\w+)\s*\((?P<args>[^)]*)\)'
    language: .ts
 
  - name: propagate
    pattern: '(?P<value>\w+)\?'
    language: .rs
 
  - name: return
    pattern: 'return\s+(?P<value>.+)'
 
  - name: yield
    pattern: 'yield\s+(?P<value>.+)'
 
  - name: throw
    pattern: 'throw\s+(?P<value>.+)'
 
  - name: raise
    pattern: 'raise\s+(?P<value>.+)'
 
  - name: panic
    pattern: 'panic[!]?\s*\((?P<value>[^)]*)\)'