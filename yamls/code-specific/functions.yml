function_rules:
  - name: go-function
    pattern: 'func\s+(?P<function>\w+)\s*\('
 
  - name: go-function-typed
    pattern: 'func\s+(?P<function>\w+)\s*\([^)]*\)\s*(?P<returntype>[\w\[\]\*]+)\s*\{'
    language: .go
 
  - name: py-def
    pattern: 'def\s+(?P<function>\w+)\s*\('
 
  - name: py-def-annotated
    pattern: 'def\s+(?P<function>\w+)\s*\([^)]*\)\s*->\s*(?P<returntype>[^:]+):'
    language: .py
 
  - name: js-function
    pattern: 'function\s+(?P<function>\w+)\s*\('
 
  - name: js-arrow-function
    pattern: 'const\s+(?P<function>\w+)\s*=\s*\(.*\)\s*=>'
 
  - name: ts-function-typed
    pattern: 'function\s+(?P<function>\w+)[^)]*\)\s*:\s*(?P<returntype>[^{]+)\{'
    language: .ts
 
  - name: rs-function
    pattern: 'fn\s+(?P<function>\w+)\s*\('
 
  - name: csharp-function
    pattern: '(public|private|protected)?\s*(static)?\s*\w+\s+(?P<function>\w+)\s*\('
    language: .cs
 
  - name: java-function
    pattern: '(public|private|protected)?\s*(static)?\s*\w+\s+(?P<function>\w+)\s*\('
    language: .java
 
  - name: cpp-function
    pattern: '(?P<function>\w+)\s*\(.*\)\s*{'
    language: .cpp
 
  - name: c-function
    pattern: '(?P<function>\w+)\s*\(.*\)\s*{'
    language: .c
 
parameter_rules:
  - name: function-parameters
    pattern: '\((?P<params>[^)]*)\)'