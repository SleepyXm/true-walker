name: http_routes

route_methods: [GET, POST, PUT, PATCH, DELETE]

# ── Prefix Rules ──────────────────────────────────────────────────────────────
# (framework-specific; kept as-is — no meaningful generalisation possible)
prefix_rules:
  - name: go-group               # gin, echo, chi, fiber — was two identical rules
    pattern: '(?P<var>\w+)\s*:=\s*(?P<receiver>\w+)\.Group\(\s*["`](?P<prefix>/[^"`\s]+)'

  - name: express-use
    pattern: '(?P<receiver>\w+)\.use\(\s*["`](?P<prefix>/[^"`\s]+)["`]\s*,\s*(?P<var>\w+)'

  - name: fastapi-router
    pattern: '(?P<var>\w+)\s*=\s*APIRouter\([^)]*prefix\s*=\s*["`](?P<prefix>/[^"`\s]+)'

  - name: fastapi-include
    pattern: '\.include_router\s*\(\s*(?P<var>\w+)[^)]*prefix\s*=\s*["`''](?P<prefix>/[^"`''\s]+)'

  - name: axum-nest
    pattern: '\.nest\(\s*["`](?P<prefix>/[^"`\s]+)["`]\s*,\s*(?P<var>\w+)'

  - name: laravel-prefix
    pattern: 'Route::prefix\s*\(\s*["`''](?P<prefix>/[^"`''\s]+)["`'']\s*\)\s*->\s*group\s*\(.*(?P<var>\w+)\s*\)'

# ── Route Rules ───────────────────────────────────────────────────────────────
route_rules:
  - name: dot-method             # Express, Hono, most JS/TS routers
    pattern: '(?P<receiver>\w+)\.(?P<method>METHOD)\s*\(\s*["`](?P<path>/[^"`\s]*)'

  - name: decorator              # FastAPI, Django Ninja, most Python decorators
    pattern: '@(?P<receiver>\w+)\.(?P<method>METHOD)\s*\(\s*["`](?P<path>/[^"`\s]+)'

  - name: flask-route            # Flask multi-method decorator
    pattern: '@(?P<receiver>\w+)\.route\(\s*["`](?P<path>/[^"`\s]+)["`][^)]*methods\s*=\s*\[(?P<method>[^\]]+)\]'
    multi: true

  - name: axum-route             # Rust axum
    pattern: '(?P<receiver>\w+)\.route\(\s*["`](?P<path>/[^"`\s]+)["`]\s*,\s*(?P<method>METHOD)\s*\('

  - name: rust-macro             # actix-web, poem
    pattern: '#\[\s*(?P<method>METHOD)\s*\(\s*["`](?P<path>/[^"`\s]+)'

  - name: spring-mapping         # Spring Boot @GetMapping / @PostMapping / …
    pattern: '@(?P<method>METHOD)Mapping\s*\(\s*(?:value\s*=\s*|path\s*=\s*)?["`](?P<path>/[^"`\s]+)'

  - name: aspnet-attribute       # ASP.NET Core [HttpGet("path")]
    pattern: '\[Http(?P<method>METHOD)\s*\(\s*["`](?P<path>[^"`\s]+)'

  - name: laravel-route
    pattern: 'Route::(?P<method>METHOD)\s*\(\s*["`''](?P<path>/[^"`''\s]+)'

  - name: rails-route
    pattern: '^\s*(?P<method>METHOD)\s+["`''](?P<path>/[^"`''\s]+)'

  - name: go-mux                 # gorilla/mux method string literal
    pattern: '"(?P<method>GET|POST|PUT|PATCH|DELETE)\s+(?P<path>/[^"]+)"'

  - name: go-handlefunc          # gorilla/mux .HandleFunc().Methods(...)
    pattern: '\.HandleFunc\s*\(\s*["`](?P<path>/[^"`\s]+)["`][^)]*\)\.Methods\s*\(\s*["`](?P<method>METHOD)["`]'

  - name: nestjs-decorator       # NestJS @Get/@Post — explicit rule to disambiguate
    pattern: '@(?P<method>METHOD)\s*\(\s*["`''](?P<path>/[^"`''\s]*)["`'']'

# ── Import Rules ──────────────────────────────────────────────────────────────
import_rules:
  # Go (two forms: block and single-line)
  - name: go-import-block
    pattern: '^\s*"(?P<import>[^"]+)"'
    languages: [.go]

  - name: go-import-single
    pattern: '^import\s+"(?P<import>[^"]+)"'
    languages: [.go]

  # Python
  - name: py-import
    pattern: '^import\s+(?P<imports>[\w\s,]+)'
    languages: [.py]

  - name: py-from-import
    pattern: '^from\s+(?P<module>[\w\.]+)\s+import\s+(?P<names>.+)'
    languages: [.py]

  # JS/TS/JSX/TSX/MJS — ES module (was three identical rules; merged into one family)
  - name: esm-import
    pattern: '^import\s+.*from\s+["''](?P<import>[^"'']+)["'']'
    languages: [.js, .ts, .tsx, .jsx, .mjs, .cjs]

  - name: esm-import-named
    pattern: '^import\s+\{(?P<names>[^}]+)\}\s+from\s+["''](?P<import>[^"'']+)["'']'
    languages: [.js, .ts, .tsx, .jsx, .mjs, .cjs]

  - name: esm-import-namespace
    pattern: '^import\s+\*\s+as\s+\w+\s+from\s+["''](?P<import>[^"'']+)["'']'
    languages: [.js, .ts, .tsx, .jsx, .mjs, .cjs]

  - name: cjs-require
    pattern: 'require\(["''](?P<import>[^"'']+)["'']\)'
    languages: [.js, .ts, .tsx, .jsx, .mjs, .cjs]

  # Rust / PHP — both use the `use` keyword with path syntax
  - name: use-import
    pattern: '^use\s+(?P<import>[\w:\\]+(?:::\*)?)'
    languages: [.rs, .php]

  # JVM family — import [static] a.b.c[.*]
  - name: jvm-import
    pattern: '^import\s+(?:static\s+)?(?P<import>[\w\.]+(?:\.\*)?)'
    languages: [.java, .kt, .groovy, .scala]

  # C# — using [static] a.b.c
  - name: csharp-using
    pattern: '^using\s+(?:static\s+)?(?P<import>[\w\.]+)'
    languages: [.cs]

  # Ruby / Crystal
  - name: require-string
    pattern: 'require\s+["''](?P<import>[^"'']+)["'']'
    languages: [.rb, .cr]

  # C / C++ / Objective-C
  - name: c-include
    pattern: '^#include\s+[<"](?P<import>[^>"]+)[>"]'
    languages: [.c, .cpp, .h, .hpp, .cc, .cxx, .m, .mm]

  # Swift
  - name: swift-import
    pattern: '^import\s+(?P<import>\w[\w.]*)'
    languages: [.swift]

  # Dart
  - name: dart-import
    pattern: '^import\s+["''](?P<import>[^"'']+)["''](?:\s+as\s+\w+)?;'
    languages: [.dart]

  # Elixir — alias / use / import / require Module.Name
  - name: elixir-import
    pattern: '^(?:alias|use|import|require)\s+(?P<import>[\w.]+)'
    languages: [.ex, .exs]

  # Haskell
  - name: haskell-import
    pattern: '^import\s+(?:qualified\s+)?(?P<import>[\w.]+)'
    languages: [.hs, .lhs]

  # Lua
  - name: lua-require
    pattern: 'require\s*\(?["''](?P<import>[^"'']+)["'']\)?'
    languages: [.lua]

# ── Function Rules ──────────────────────────────────────────────────────────────
function_rules:
  # Universal keyword-prefix family: func / fn / def / function / fun / sub / proc / defun / defn
  # Covers: Go, Rust, Python, JS, Kotlin, VB, Nim, Tcl, Lisp, Clojure, Elixir, Haskell (where)
  - name: keyword-function
    pattern: '(?:pub\s+)?(?:async\s+)?(?:unsafe\s+)?(?P<keyword>func|fn|def|function|fun|sub|proc|defun|defn)\s+(?P<function>\w+)\s*[(<]'

  # JS/TS arrow: const/let name = (...) => ...
  - name: arrow-function
    pattern: '(?:export\s+)?(?:const|let)\s+(?P<function>\w+)\s*=\s*(?:async\s+)?(?:\(.*\)|\w+)\s*=>'
    languages: [.js, .ts, .tsx, .jsx, .mjs]

  # Methods with access modifiers (Java, C#, Kotlin, Swift, PHP, C++)
  - name: modifier-method
    pattern: '(?:(?:public|private|protected|internal|override|static|async|virtual|abstract|final|native|synchronized)\s+)+(?:[\w<>\[\]?*&]+\s+)+(?P<function>\w+)\s*\('
    languages: [.java, .cs, .cpp, .kt, .swift, .php]

  # C / C++ free function: ReturnType name(args) {
  - name: c-function
    pattern: '^(?:inline\s+)?(?:static\s+)?(?:[\w:*&<>]+\s+)+(?P<function>\w+)\s*\([^;)]*\)\s*(?:const\s*)?\{'
    languages: [.c, .cpp, .h, .hpp]

# ── Loop Rules ──────────────────────────────────────────────────────────────
loop_rules:
  # C-style for(...)/while(...) { — C, Java, JS, C#, PHP, Swift, Kotlin, Dart
  - name: c-style-loop
    pattern: '(?P<loop>for|while)\s*\([^)]*\)\s*\{'

  # Colon-terminated — Python, Ruby, Elixir, Crystal
  - name: colon-loop
    pattern: '(?P<loop>for|while)\s+[^:{]+:\s*$'
    languages: [.py, .rb, .ex, .exs, .cr]

  # Brace-terminated without parens — Go, Rust, Swift, Kotlin, Dart
  - name: brace-loop
    pattern: '(?P<loop>for|while|loop)\s+[^({]*\{'
    languages: [.go, .rs, .swift, .kt, .dart]

# ── Assignment Rules ──────────────────────────────────────────────────────────────
assignment_rules:
  # Generic (universal fallback)
  - name: assignment
    pattern: '(?P<var>\w+)\s*=\s*(?P<value>.+)'

  # Go short declaration
  - name: go-declare
    pattern: '(?P<var>\w+)\s*:=\s*(?P<value>.+)'
    languages: [.go]

  # Explicitly typed let/const/val/var (TS, Kotlin, Swift, Dart)
  - name: typed-declare
    pattern: '(?:let|const|var|val)\s+(?P<var>\w+)(?:\s*:\s*[\w<>?[\]]+)?\s*=\s*(?P<value>.+)'
    languages: [.ts, .tsx, .js, .jsx, .kt, .swift, .dart]

# ── Parameter Rules ──────────────────────────────────────────────────────────────
parameter_rules:
  - name: function-parameters
    pattern: '\((?P<params>[^)]*)\)'

# ── Class / Type Rules ──────────────────────────────────────────────────────────────
class_rules:
  # `class` keyword — most OO languages share identical syntax
  - name: class-declaration
    pattern: '(?:export\s+)?(?:(?:public|private|protected|internal|abstract|final|data|sealed|open|static)\s+)*class\s+(?P<class>\w+)'
    languages: [.py, .java, .kt, .ts, .tsx, .js, .jsx, .cs, .php, .rb, .swift, .dart, .cr, .groovy, .scala]

  # `interface` keyword
  - name: interface-declaration
    pattern: '(?:export\s+)?(?:public\s+)?interface\s+(?P<class>\w+)'
    languages: [.java, .ts, .tsx, .js, .cs, .kt, .php, .swift, .go]

  # `struct` keyword — Go, Rust, C/C++, C#, Swift
  - name: struct-declaration
    pattern: '(?:pub\s+)?(?:type\s+)?(?P<class>\w+)\s+struct\s*\{'
    languages: [.go, .rs, .c, .cpp, .cs, .swift]

  # `enum` keyword
  - name: enum-declaration
    pattern: '(?:pub\s+)?(?:public\s+)?(?:export\s+)?enum\s+(?P<class>\w+)'
    languages: [.rs, .java, .kt, .ts, .tsx, .cs, .swift, .dart]

  # Type alias — `type X =`
  - name: type-alias
    pattern: '(?:export\s+)?type\s+(?P<class>\w+)\s*='
    languages: [.go, .ts, .tsx]

  # `trait` keyword — Rust, Scala, PHP
  - name: trait-declaration
    pattern: '(?:pub\s+)?trait\s+(?P<class>\w+)'
    languages: [.rs, .scala, .php]

  # `module` keyword — Ruby, Elixir, Crystal
  - name: module-declaration
    pattern: 'module\s+(?P<class>\w+)'
    languages: [.rb, .ex, .exs, .cr]

# ── Field Rules ──────────────────────────────────────────────────────────────
field_rules:
  # Colon-typed field: [modifier] field[?]: Type [= default]
  # Covers: TypeScript, Python (dataclass/Pydantic), Kotlin, Rust, Swift, Dart
  - name: colon-typed-field
    pattern: '^\s*(?:readonly\s+|val\s+|var\s+|pub\s+)?(?P<field>[a-zA-Z_]\w*)\??\s*:\s*(?P<type>[^=;\n{]+?)(?:\s*=\s*(?P<default>[^;\n]+))?[;,]?\s*$'
    languages: [.ts, .tsx, .py, .kt, .rs, .swift, .dart]

  # Go struct field: Name Type [`tag`]
  - name: go-field
    pattern: '^\s+(?P<field>[A-Z]\w*)\s+(?P<type>[\w\*\[\]\.]+)(?:\s+`(?P<tag>[^`]+)`)?'
    languages: [.go]

  # Java / C# / C++ field with access modifiers: [modifiers] Type name
  - name: modifier-typed-field
    pattern: '^\s+(?:(?:public|private|protected|internal|static|final|readonly|volatile|transient|override|const)\s+)+(?P<type>[\w<>\[\]?]+)\s+(?P<field>\w+)'
    languages: [.java, .cs, .cpp]

  # PHP property: [modifiers] $field
  - name: php-field
    pattern: '^\s+(?:(?:public|private|protected|static|readonly)\s+)*\$(?P<field>\w+)'
    languages: [.php]

  # Ruby attr_accessor / attr_reader / attr_writer
  - name: rb-attr
    pattern: '^\s+attr_(?:accessor|reader|writer)\s+:(?P<field>\w+)'
    languages: [.rb]

  # SQLAlchemy ORM column
  - name: sqlalchemy-column
    pattern: '^\s+(?P<field>\w+)\s*=\s*(?:mapped_column|Column)\s*\((?P<args>[^)]+)\)'
    languages: [.py]

# ── Return / Control-flow Rules ──────────────────────────────────────────────────────────────
return_rules:
  # Standard return (universal)
  - name: return
    pattern: 'return\s+(?P<value>.+)'

  # Multi-value return — Go tuples, Python tuples
  - name: multi-return
    pattern: 'return\s+(?P<value>\S[^,\n]+(?:,\s*\S[^,\n]+)+)'
    languages: [.go, .py]

  # Rust ? propagation
  - name: propagate
    pattern: '(?P<value>\w+)\?'
    languages: [.rs]

  # throw [new] Exception(...) — JVM, C#, JS/TS, Swift, Dart, PHP
  - name: throw-exception
    pattern: 'throw(?:\s+new)?\s+(?P<value>\w+(?:\s*\([^)]*\))?)'
    languages: [.java, .cs, .ts, .tsx, .js, .jsx, .kt, .php, .swift, .dart]

  # raise Exception(...) — Python, Ruby, Crystal
  - name: raise-exception
    pattern: 'raise\s+(?P<value>[\w]+(?:\s*\([^)]*\))?)'
    languages: [.py, .rb, .cr]

  # yield (generators: Python, JS/TS, Ruby, Rust)
  - name: yield
    pattern: 'yield\s+(?P<value>.+)'

  # panic! — Go, Rust
  - name: panic
    pattern: 'panic[!]?\s*\((?P<value>[^)]*)\)'
    languages: [.go, .rs]