name: http_routes

route_methods:
  - GET
  - POST
  - PUT
  - PATCH
  - DELETE

# ── Prefix Rules ──────────────────────────────────────────────────────────────
prefix_rules:
  - name: gin-group
    pattern: '(?P<var>\w+)\s*:=\s*(?P<receiver>\w+)\.Group\(\s*["`](?P<prefix>/[^"`\s]+)'

  - name: echo-group
    pattern: '(?P<var>\w+)\s*:=\s*(?P<receiver>\w+)\.Group\(\s*["`](?P<prefix>/[^"`\s]+)'

  - name: express-router-use
    pattern: '(?P<receiver>\w+)\.use\(\s*["`](?P<prefix>/[^"`\s]+)["`]\s*,\s*(?P<var>\w+)'

  - name: fastapi-apirouter
    pattern: '(?P<var>\w+)\s*=\s*APIRouter\([^)]*prefix\s*=\s*["`](?P<prefix>/[^"`\s]+)'

  - name: fastapi-include-router
    pattern: '\.include_router\s*\(\s*(?P<var>\w+)[^)]*prefix\s*=\s*["`''](?P<prefix>/[^"`''\s]+)'

  - name: axum-nest
    pattern: '\.nest\(\s*["`](?P<prefix>/[^"`\s]+)["`]\s*,\s*(?P<var>\w+)'

  - name: laravel-prefix-group
    pattern: 'Route::prefix\s*\(\s*["`''](?P<prefix>/[^"`''\s]+)["`'']\s*\)\s*->\s*group\s*\(.*(?P<var>\w+)\s*\)'

# ── Route Rules ───────────────────────────────────────────────────────────────
route_rules:
  - name: dot-method
    pattern: '(?P<receiver>\w+)\.(?P<method>METHOD)\s*\(\s*["`](?P<path>/[^"`\s]*)'

  - name: axum-route
    pattern: '(?P<receiver>\w+)\.route\(\s*["`](?P<path>/[^"`\s]+)["`]\s*,\s*(?P<method>METHOD)\s*\('

  - name: decorator
    pattern: '@(?P<receiver>\w+)\.(?P<method>METHOD)\s*\(\s*["`](?P<path>/[^"`\s]+)'

  - name: flask-route
    pattern: '@(?P<receiver>\w+)\.route\(\s*["`](?P<path>/[^"`\s]+)["`][^)]*methods\s*=\s*\[(?P<method>[^\]]+)\]'
    multi: true

  - name: rust-macro
    pattern: '#\[\s*(?P<method>METHOD)\s*\(\s*["`](?P<path>/[^"`\s]+)'

  - name: go-mux
    pattern: '"(?P<method>GET|POST|PUT|PATCH|DELETE)\s+(?P<path>/[^"]+)"'

  # gorilla/mux: r.HandleFunc("/path", h).Methods("GET")
  - name: go-handlefunc-methods
    pattern: '\.HandleFunc\s*\(\s*["`](?P<path>/[^"`\s]+)["`][^)]*\)\.Methods\s*\(\s*["`](?P<method>METHOD)["`]'

  # Spring Boot: @GetMapping("/path"), @PostMapping(value="/path")
  - name: spring-mapping
    pattern: '@(?P<method>METHOD)Mapping\s*\(\s*(?:value\s*=\s*|path\s*=\s*)?["`](?P<path>/[^"`\s]+)'

  # NestJS: @Get('/path'), @Post('/path')
  - name: nestjs-decorator
    pattern: '@(?P<method>METHOD)\s*\(\s*["`''](?P<path>/[^"`''\s]*)["`'']'

  # ASP.NET: [HttpGet("path")] — path may omit leading slash
  - name: aspnet-attribute
    pattern: '\[Http(?P<method>METHOD)\s*\(\s*["`](?P<path>[^"`\s]+)'

  # Laravel: Route::get('/path', ...)
  - name: laravel-route
    pattern: 'Route::(?P<method>METHOD)\s*\(\s*["`''](?P<path>/[^"`''\s]+)'

  # Rails routes.rb: get '/path', to: ...
  - name: rails-route
    pattern: '^\s*(?P<method>METHOD)\s+["`''](?P<path>/[^"`''\s]+)'

# ── Import Rules ──────────────────────────────────────────────────────────────
import_rules:
  - name: go-import
    # Matches import paths like "database/sql" but excludes JSON keys like "net_pnl": 0
    pattern: '^\s*"(?P<import>[\w/.-]+)"\s*(//.*)?$'
    language: .go

  - name: go-import-alias
    pattern: '^\s*(?P<alias>\w+)\s+"(?P<import>[\w/.-]+)"\s*(//.*)?$'
    language: .go

  - name: go-import-single
    pattern: '^import\s+"(?P<import>[^"]+)"'
    language: .go

  # extended to [\w\.,\s]+ to catch: import os, sys, re
  - name: py-import
    pattern: '^import\s+(?P<imports>.+)'
    language: .py

  - name: py-from-import
    pattern: '^from\s+(?P<module>[\w\.]+)\s+import\s+(?P<names>.+)'
    language: .py

  - name: js-import
    pattern: '^import\s+.*from\s+["''](?P<import>[^"'']+)["'']'
    language: .js

  - name: js-import-namespace
    pattern: '^import\s+\*\s+as\s+\w+\s+from\s+["''](?P<import>[^"'']+)["'']'
    language: .js

  - name: js-import-named  
    pattern: '^import\s+\{(?P<names>[^}]+)\}\s+from\s+["''](?P<import>[^"'']+)["'']'
    language: .js

  - name: js-require
    pattern: 'require\(["''](?P<import>[^"'']+)["'']\)'
    language: .js

  - name: ts-import
    pattern: '^import\s+.*from\s+["''](?P<import>[^"'']+)["'']'
    language: .ts

  - name: ts-import-named
    pattern: '^import\s+\{(?P<names>[^}]+)\}\s+from\s+["''](?P<import>[^"'']+)["'']'
    language: .ts

  - name: ts-require
    pattern: 'require\(["''](?P<import>[^"'']+)["'']\)'
    language: .ts

  - name: tsx-import
    pattern: '^import\s+.*from\s+["''](?P<import>[^"'']+)["'']'
    language: .tsx

  - name: rs-import
    pattern: '^use\s+(?P<import>[\w:]+)'
    language: .rs

  - name: java-import
    pattern: '^import\s+(?:static\s+)?(?P<import>[\w\.]+)'
    language: .java

  - name: kotlin-import
    pattern: '^import\s+(?P<import>[\w\.]+)'
    language: .kt

  - name: php-use
    pattern: '^use\s+(?P<import>[\w\\]+)'
    language: .php

  - name: ruby-require
    pattern: 'require\s+["''](?P<import>[^"'']+)["'']'
    language: .rb

  - name: csharp-using
    pattern: '^using\s+(?P<import>[\w\.]+)'
    language: .cs

  - name: c-include
    pattern: '^\s*#include\s+(?P<import><[^>]+>|"[^"]+")'
    language: .c

# ── Function Rules ──────────────────────────────────────────────────────────────

function_rules:
  - name: go-function
    pattern: 'func\s+(?P<function>\w+)\s*\('

  - name: py-def
    pattern: 'def\s+(?P<function>\w+)\s*\('

  - name: py-def-annotated
    pattern: 'def\s+(?P<function>\w+)\s*\([^)]*\)\s*->\s*(?P<returntype>[^:]+):'
    language: .py

  - name: js-function
    pattern: 'function\s+(?P<function>\w+)\s*\('

  - name: js-arrow-function
    pattern: 'const\s+(?P<function>\w+)\s*=\s*\(.*\)\s*=>'

  - name: ts-function-typed
    pattern: 'function\s+(?P<function>\w+)[^)]*\)\s*:\s*(?P<returntype>[^{]+)\{'
    language: .ts

  - name: rs-function
    pattern: 'fn\s+(?P<function>\w+)\s*\('

  - name: csharp-function
    pattern: '(public|private|protected)?\s*(static)?\s*\w+\s+(?P<function>\w+)\s*\('
    language: .cs

  - name: java-function
    pattern: '(public|private|protected)?\s*(static)?\s*\w+\s+(?P<function>\w+)\s*\('
    language: .java

  - name: cpp-function
    pattern: '(?P<function>\w+)\s*\(.*\)\s*{'
    language: .cpp

  - name: c-function
    pattern: '(?P<function>\w+)\s*\(.*\)\s*{'
    # should look like it can capture this int time_independent_strcmp(char *a, char *b, int len) {
    #int diff = 0;
    #for (int j = 0; j < len; j++) {
    #    diff |= (a[j] ^ b[j]);
    #}
    #return diff; /* If zero strings are the same. */
#} # should be able to have list of representation functions like int, void, etc.

  - name: go-function-typed
    pattern: 'func\s+(?P<function>\w+)\s*\([^)]*\)\s*(?P<returntype>[\w\[\]\*]+)\s*\{'
    language: .go

# ── Loop Rules ──────────────────────────────────────────────────────────────

loop_rules:
  - name: for-loop
    pattern: 'for\s*\(.*\)\s*{'
  - name: while-loop
    pattern: 'while\s*\(.*\)\s*{'
  - name: python-for
    pattern: 'for\s+.*:\s*$'
  - name: python-while
    pattern: 'while\s+.*:\s*$'
  - name: go-loops
    pattern: '(?P<loop>for|range)\s+.*\s*{'

# ── Assignment Rules ──────────────────────────────────────────────────────────────

assignment_rules:
  - name: variable-assignment
    pattern: '(?P<var>\w+)\s*=\s*.*'
  - name: go-short-variable-declaration
    pattern: '(?P<var>\w+)\s*:=\s*.*'

# ── Param Rules ──────────────────────────────────────────────────────────────

parameter_rules:
  - name: function-parameters
    pattern: '\((?P<params>[^)]*)\)'

# ── Class / Type Rules ──────────────────────────────────────────────────────────────

class_rules:
  - name: py-class
    pattern: '^class\s+(?P<class>\w+)\s*(?:\((?P<bases>[^)]*)\))?:'
    language: .py

  - name: ts-interface
    pattern: '(?:export\s+)?interface\s+(?P<class>\w+)\s*(?:extends\s+(?P<bases>[\w,\s]+))?\s*\{'
    language: .ts

  - name: ts-type-alias
    pattern: '(?:export\s+)?type\s+(?P<class>\w+)\s*=\s*\{'
    language: .ts

  - name: ts-class
    pattern: '(?:export\s+)?(?:abstract\s+)?class\s+(?P<class>\w+)(?:\s+extends\s+(?P<base>\w+))?'
    language: .ts

  - name: tsx-interface
    pattern: '(?:export\s+)?interface\s+(?P<class>\w+)\s*(?:extends\s+(?P<bases>[\w,\s]+))?\s*\{'
    language: .tsx

  - name: go-struct
    pattern: 'type\s+(?P<class>\w+)\s+struct\s*\{'
    language: .go

  - name: go-interface
    pattern: 'type\s+(?P<class>\w+)\s+interface\s*\{'
    language: .go

  - name: rs-struct
    pattern: '(?:pub\s+)?struct\s+(?P<class>\w+)'
    language: .rs

  - name: rs-enum
    pattern: '(?:pub\s+)?enum\s+(?P<class>\w+)'
    language: .rs

  - name: java-class
    pattern: '(?:public|private|protected)?\s*(?:abstract\s+)?class\s+(?P<class>\w+)(?:\s+extends\s+(?P<base>\w+))?'
    language: .java

  - name: java-interface
    pattern: '(?:public|private|protected)?\s*interface\s+(?P<class>\w+)'
    language: .java

  - name: kt-class
    pattern: '(?:data\s+)?class\s+(?P<class>\w+)(?:\s*\((?P<fields>[^)]*)\))?'
    language: .kt

  - name: csharp-class
    pattern: '(?:public|private|protected|internal)?\s*(?:abstract\s+)?(?:class|record|struct)\s+(?P<class>\w+)(?:\s*:\s*(?P<bases>[\w,\s]+))?'
    language: .cs

  - name: php-class
    pattern: 'class\s+(?P<class>\w+)(?:\s+extends\s+(?P<base>\w+))?'
    language: .php

  - name: rb-class
    pattern: 'class\s+(?P<class>\w+)(?:\s*<\s*(?P<base>\w+))?'
    language: .rb

# ── Field Rules ──────────────────────────────────────────────────────────────

field_rules:
  # Python typed field (Pydantic / dataclass)
  - name: python_type_annotation
    pattern: '^(?P<field>[a-zA-Z_]\w*)\s*:\s*(?P<type>[^=\n]+?)(?:\s*=\s*(?P<default>.+))?$'
    language: .py
  
  - name: python_type_annotation
    pattern: '^(?P<field>[a-zA-Z_]\w*)\s*:\s*(?P<type>[^=\n]+?)(?:\s*=\s*(?P<default>.+))?$'
    language: .py

  # SQLAlchemy column
  - name: py-column
    pattern: '^\s+(?P<field>\w+)\s*=\s*(?:mapped_column|Column)\s*\((?P<args>[^)]+)\)'
    language: .py

  # TypeScript / interface / class property
  - name: ts-field
    pattern: '^\s+(?:readonly\s+)?(?P<field>\w+)\??\s*:\s*(?P<type>[^;=\n]+)'
    language: .ts

  - name: tsx-field
    pattern: '^\s+(?:readonly\s+)?(?P<field>\w+)\??\s*:\s*(?P<type>[^;=\n]+)'
    language: .tsx

  # Go struct field
  - name: go-field
    pattern: '^\s+(?P<field>\w+)\s+(?P<type>[\w\*\[\]]+)(?:\s+`(?P<tag>[^`]+)`)?'
    language: .go

  # Rust struct field
  - name: rs-field
    pattern: '^\s+(?:pub\s+)?(?P<field>\w+)\s*:\s*(?P<type>[\w<>\[\],\s&]+)'
    language: .rs

  # Java / Kotlin field
  - name: java-field
    pattern: '^\s+(?:private|public|protected)?\s*(?:final\s+)?(?P<type>[\w<>]+)\s+(?P<field>\w+)'
    language: .java

  - name: kt-field
    pattern: '^\s+(?:val|var)\s+(?P<field>\w+)\s*:\s*(?P<type>[\w<>?]+)'
    language: .kt

  # C# property
  - name: csharp-field
    pattern: '^\s+(?:public|private|protected)?\s*(?P<type>[\w<>?]+)\s+(?P<field>\w+)\s*\{'
    language: .cs

  # PHP property
  - name: php-field
    pattern: '^\s+(?:public|private|protected)?\s*\$(?P<field>\w+)'
    language: .php

  # Ruby attr_accessor / attr_reader
  - name: rb-attr
    pattern: '^\s+attr_(?:accessor|reader|writer)\s+:(?P<field>\w+)'
    language: .rb


# ── Default Return Rules ──────────────────────────────────────────────────────────────
return_rules:
  # ── language-specific first (wins via break) ──────────────────
  - name: go-return-multi
    pattern: 'return\s+(?P<value>[^,\n]+(?:,\s*[^,\n]+)+)'
    language: .go
    
  - name: go-return-single
    pattern: '^\s+return\s+(?P<value>\S+)'
    language: .go

  - name: py-raise
    pattern: 'raise\s+(?P<value>[\w]+(?:\s*\([^)]*\))?)'
    language: .py

  - name: ts-throw
    pattern: 'throw\s+new\s+(?P<value>\w+)\s*\((?P<args>[^)]*)\)'
    language: .ts

  - name: propagate
    pattern: '(?P<value>\w+)\?'
    language: .rs

  # ── generic fallbacks ──────────────────────────────────────────
  - name: return
    pattern: 'return\s+(?P<value>.+)'

  - name: yield
    pattern: 'yield\s+(?P<value>.+)'

  - name: throw
    pattern: 'throw\s+(?P<value>.+)'

  - name: raise
    pattern: 'raise\s+(?P<value>.+)'

  - name: panic
    pattern: 'panic[!]?\s*\((?P<value>[^)]*)\)'